#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "dex"
name = "Dex"
description.en = "OpenID Connect Provider based on YunoHost LDAP server"
description.fr = "Connecteur OpenID basé sur le serveur LDAP YunoHost"

version = "2.45.1~ynh1"

maintainers = [ "Limezy" ]

[upstream]
license = "Apache-2.0"
website = "https://dexidp.io"
admindoc = "https://dexidp.io/docs/"
code = "https://github.com/dexidp/dex"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = true

sso = false

disk = "50M"
ram.build = "80M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/dex"

    [install.optional_settings]
    type = "markdown"
    ask.en = "The next settings are optional and can be used to manually setup a first client. Leave any of them empty and no client will be added. Compatible apps can automatically add their client configuration in Dex."
    ask.fr = "Les paramètres suivants sont optionnels et peuvent être utilisés pour mettre en place manuellement un premier client. Si l'un d'entre eux est laissé vide, alors aucun client ne sera jouté. Les apps compatibles peuvent ajouter automatiquement la configuration de leur client à Dex."

    [install.oidc_name]
    optional = true
    ask.en = "Name of the app you want to connect to the OIDC auth flow"
    ask.fr = "Nom de l'application que vous souhaitez connecter au flux d'authentification OIDC"
    type = "string"

    [install.oidc_secret]
    optional = true
    ask.en = "OIDC secret of the app you want to connect to the OIDC auth flow"
    ask.fr = "Secret OIDC de l'application que vous souhaitez connecter au flux d'authentification OIDC"
    type = "string"

    [install.oidc_callback]
    optional = true
    ask.en = "Callback URI required by the app you want to connect to the OIDC auth flow"
    ask.fr = "URI de rappel requis par l'application que vous souhaitez connecter au flux d'authentification OIDC"
    type = "string"


[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/dexidp/dex/archive/refs/tags/v2.45.1.tar.gz"
    sha256 = "6dc9bf768d67723d8117268d5177c7450519608f5403cd10e857c89465fa2b9e"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    main.show_tile = false
    main.allowed = "visitors"

    [resources.ports]
    main.default = 5556
